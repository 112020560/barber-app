<div class="flex align-items-center justify-content-center min-h-screen p-3">
  <p-card header="Recuperar contraseña" styleClass="w-full md:w-30rem">

    @if (success()) {
      <p-message severity="success" text="Si el email está registrado, recibirás un enlace en breve. Revisa tu bandeja de entrada." />
      <div class="text-center mt-3">
        <a routerLink="/login" class="text-primary no-underline font-medium">Volver al login</a>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">

        <p class="text-500 m-0">Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

        @if (error()) {
          <p-message severity="error" [text]="error()!" />
        }

        <div class="flex flex-column gap-2">
          <label>Email</label>
          <input pInputText formControlName="email" placeholder="correo@ejemplo.com" />
        </div>

        <button
          pButton
          type="submit"
          label="Enviar enlace"
          [disabled]="form.invalid || loading()"
          [loading]="loading()"
        ></button>

        <div class="text-center">
          <a routerLink="/login" class="text-primary no-underline font-medium">Volver al login</a>
        </div>
      </form>
    }

  </p-card>
</div>
