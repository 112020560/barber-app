<div class="flex align-items-center justify-content-center min-h-screen p-3">
  <p-card header="Iniciar sesión" styleClass="w-full md:w-30rem">
    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
      <div class="flex flex-column gap-2">
        <label>Email</label>
        <input pInputText formControlName="email" placeholder="correo@ejemplo.com" />
      </div>

      <div class="flex flex-column gap-2">
        <label>Contraseña</label>
        <p-password formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
      </div>

      @if (errorMessage) {
        <small class="p-error">{{ errorMessage }}</small>
      }

      <button pButton type="submit" label="Entrar" [disabled]="form.invalid || loading"></button>

      <div class="text-center">
        <span class="text-500">¿No tienes cuenta? </span>
        <a routerLink="/register" class="text-primary no-underline font-medium">Regístrate</a>
      </div>
    </form>
  </p-card>
</div>
