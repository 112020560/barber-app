<div class="flex align-items-center justify-content-center min-h-screen p-3">
  <p-card header="Nueva contraseña" styleClass="w-full md:w-30rem">
    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">

      @if (error()) {
        <p-message severity="error" [text]="error()!" />
      }

      <div class="flex flex-column gap-2">
        <label>Nueva contraseña</label>
        <p-password
          formControlName="newPassword"
          [feedback]="true"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          promptLabel="Ingresa una contraseña"
          weakLabel="Débil"
          mediumLabel="Media"
          strongLabel="Fuerte"
        />
      </div>

      <div class="flex flex-column gap-2">
        <label>Confirmar contraseña</label>
        <p-password
          formControlName="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      <button
        pButton
        type="submit"
        label="Guardar contraseña"
        [disabled]="form.invalid || loading() || !token()"
        [loading]="loading()"
      ></button>

      <div class="text-center">
        <a routerLink="/login" class="text-primary no-underline font-medium">Volver al login</a>
      </div>
    </form>
  </p-card>
</div>
